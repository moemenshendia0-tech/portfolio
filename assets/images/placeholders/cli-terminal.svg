<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#0d1117"/>
  <rect x="1" y="1" width="398" height="198" stroke="#30363d" stroke-width="1"/>
  <rect x="0" y="0" width="400" height="28" fill="#161b22"/>
  <circle cx="14" cy="14" r="4" fill="#f85149" opacity="0.7"/>
  <circle cx="28" cy="14" r="4" fill="#d29922" opacity="0.7"/>
  <circle cx="42" cy="14" r="4" fill="#3fb950" opacity="0.7"/>
  <text x="56" y="18" fill="#8b949e" font-family="monospace" font-size="10">Router# configure terminal</text>
  <text x="16" y="52" fill="#3fb950" font-family="monospace" font-size="11">Router(config)# interface gi0/0</text>
  <text x="16" y="72" fill="#3fb950" font-family="monospace" font-size="11">Router(config-if)# ip address 192.168.1.1 255.255.255.0</text>
  <text x="16" y="92" fill="#58a6ff" font-family="monospace" font-size="11">Router(config-if)# no shutdown</text>
  <text x="16" y="112" fill="#3fb950" font-family="monospace" font-size="11">Router(config)# router ospf 1</text>
  <text x="16" y="132" fill="#3fb950" font-family="monospace" font-size="11">Router(config-router)# network 10.0.0.0 0.255.255.255 area 0</text>
  <text x="16" y="160" fill="#8b949e" font-family="monospace" font-size="10">%LINK-5-CHANGED: Interface Gi0/0, changed state to up</text>
  <text x="16" y="182" fill="#484f58" font-family="monospace" font-size="9">Cisco IOS — lab configuration</text>
</svg>
